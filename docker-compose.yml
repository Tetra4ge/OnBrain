services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onbrain-api
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - /app/app/__pycache__
    env_file:
      - .env
    depends_on:
      - mongo
      - neo4j
      - chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: onbrain-frontend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

  mongo:
    image: mongo:6.0
    container_name: onbrain-mongo
    ports:
      - "127.0.0.1:27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-rootpassword}
    volumes:
      - mongo-data:/data/db

  neo4j:
    image: neo4j:5-community
    container_name: onbrain-neo4j
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/strongpassword}
    volumes:
      - neo4j-data:/data

  chroma:
    image: chromadb/chroma:latest
    container_name: onbrain-chroma
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma-data:/chroma/chroma

volumes:
  mongo-data:
  neo4j-data:
  chroma-data:
