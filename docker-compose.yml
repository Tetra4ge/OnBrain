services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onbrain-api
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - /app/app/__pycache__
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: onbrain-frontend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    env_file:
      - ./frontend/.env
    depends_on:
      - api
